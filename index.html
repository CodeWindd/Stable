<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Material 3 Weather</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Material 3 CSS (14 files) -->
  <link rel="stylesheet" href="css/m3-base.css">
  <link rel="stylesheet" href="css/m3-color.css">
  <link rel="stylesheet" href="css/m3-typography.css">
  <link rel="stylesheet" href="css/m3-elevation.css">
  <link rel="stylesheet" href="css/m3-shapes.css">
  <link rel="stylesheet" href="css/m3-motion.css">
  <link rel="stylesheet" href="css/m3-buttons.css">
  <link rel="stylesheet" href="css/m3-cards.css">
  <link rel="stylesheet" href="css/m3-topappbar.css">
  <link rel="stylesheet" href="css/m3-textfield.css">
  <link rel="stylesheet" href="css/m3-ripple.css">
  <link rel="stylesheet" href="css/m3-theme-dark.css">
  <link rel="stylesheet" href="css/m3-theme-light.css">
  <link rel="stylesheet" href="css/m3-utils.css">
</head>
<body class="m3-light">

  <header class="m3-top-app-bar">
    <div class="m3-top-app-bar__row">
      <div class="m3-top-app-bar__title">Weather</div>
      <button class="m3-icon-button m3-ripple" id="themeToggle" aria-label="Toggle theme">
        <span class="m3-icon">dark_mode</span>
      </button>
    </div>
  </header>

  <main class="m3-main">
    <section class="m3-container">
      <div class="m3-card m3-card--elevated m3-weather-layout">
        <!-- Location + search -->
        <div class="m3-weather-header">
          <div>
            <div class="m3-body-medium" id="locationName">City</div>
            <div class="m3-body-small" id="locationDate">Loading date…</div>
          </div>
          <div class="m3-weather-search">
            <input id="cityInput" class="m3-text-field__input" type="text" value="Chicago"
                   placeholder="Enter city (Chicago, London, Tokyo, Paris)">
            <button id="fetchWeather" class="m3-button m3-button--filled m3-ripple">
              <span class="m3-button__label">Search</span>
            </button>
          </div>
        </div>

        <!-- Main current weather row -->
        <div class="m3-weather-main">
          <div class="m3-weather-main-left">
            <div class="m3-display-large" id="weatherTemp">--°F</div>
            <div class="m3-body-large" id="weatherCondition">Loading…</div>
            <div class="m3-body-medium" id="weatherMeta">
              Feels like — · High — · Low — · Wind — · Humidity —
            </div>
            <div class="m3-body-medium m3-ai-summary" id="aiSummary">
              AI Weather Report will appear here.
            </div>
          </div>
          <div class="m3-weather-main-right">
            <img id="weatherIcon" class="m3-weather-icon" alt="Weather icon">
          </div>
        </div>

        <!-- Hourly forecast -->
        <div class="m3-section-title m3-body-medium">Hourly forecast</div>
        <div class="m3-hourly-row" id="hourlyRow"></div>

        <!-- Daily forecast -->
        <div class="m3-section-title m3-body-medium">10‑day forecast</div>
        <div class="m3-daily-list" id="dailyList"></div>
      </div>
    </section>
  </main>

  <!-- JS -->
  <script type="module" src="js/material-web.js"></script>
  <script type="module" src="js/material-components.js"></script>
  <script type="module" src="js/site.js"></script>
</body>
</html>
